services:
  - type: web
    name: splitbase-paddle-ocr
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: sh start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: PADDLEOCR_LANG
        value: en
      - key: PADDLEOCR_CACHE_HOME
        value: /opt/render/project/src/.paddle-cache
      - key: PADDLE_PDX_CACHE_HOME
        value: /opt/render/project/src/.paddlex-cache
